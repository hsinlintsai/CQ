<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>國中理化化合物練習</title>
    <style>
        :root { --primary-color: #007aff; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f2f2f7; margin: 0; padding: 20px; color: #1c1c1e; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* 標題與返回鍵 */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .back-btn { font-size: 14px; padding: 8px 15px; background: #e5e5ea; border-radius: 10px; cursor: pointer; border: none; }
        
        /* 按鈕樣式：解決 Safari 爆框與字體小 */
        .btn { 
            display: flex; align-items: center; justify-content: center; width: 100%; 
            min-height: 60px; margin: 12px 0; padding: 10px 15px;
            font-size: 18px; font-weight: 500; color: var(--primary-color);
            background: #f0f7ff; border: 2px solid var(--primary-color); border-radius: 12px;
            cursor: pointer; transition: 0.2s; line-height: 1.3;
        }
        .btn:active { background: var(--primary-color); color: white; }
        
        /* 管理員區塊：清空鍵與輸入框 */
        .admin-box { display: flex; gap: 8px; margin-top: 40px; border-top: 1px solid #ddd; padding-top: 20px; }
        .admin-box input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; }
        .clear-btn { padding: 10px 15px; background: #ff3b30; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; white-space: nowrap; }

        h3 { margin-top: 0; }
        #question-text { font-size: 20px; margin-bottom: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h3 id="main-title">理化化合物練習</h3>
            <button class="back-btn" onclick="showMenu()">返回主選單</button>
        </div>
        
        <div id="display-area">
            </div>

        <div class="admin-box">
            <input type="password" id="pwdInput" placeholder="輸入密碼清空數據">
            <button class="clear-btn" onclick="handleClear()">清空榮譽榜</button>
        </div>
    </div>

    <script src="./data.js"></script>
    <script>
        const display = document.getElementById('display-area');
        
        // 顯示主選單 (自動抓取 data.js 的關卡)
        function showMenu() {
            document.getElementById('main-title').innerText = "理化練習系統";
            let html = '<p>請選擇練習關卡：</p>';
            gameData.forEach((level, index) => {
                html += `<button class="btn" onclick="startLevel(${index})">${level.levelName}</button>`;
            });
            display.innerHTML = html;
        }

        // 開始關卡
        function startLevel(index) {
            const level = gameData[index];
            document.getElementById('main-title').innerText = level.levelName;
            showQuestion(index, 0);
        }

        // 顯示題目
        function showQuestion(lvIdx, qIdx) {
            const q = gameData[lvIdx].questions[qIdx];
            if (!q) {
                display.innerHTML = "<h4>恭喜完成本關！</h4><button class='btn' onclick='showMenu()'>回主選單</button>";
                return;
            }
            
            let html = `<div id="question-text">${q.q}</div>`;
            q.options.forEach((opt, i) => {
                html += `<button class="btn" onclick="checkAns(${lvIdx}, ${qIdx}, ${i})">${opt}</button>`;
            });
            display.innerHTML = html;
        }

        // 檢查答案
        function checkAns(lvIdx, qIdx, userAns) {
            if (userAns === gameData[lvIdx].questions[qIdx].a) {
                alert("答對了！");
                showQuestion(lvIdx, qIdx + 1);
            } else {
                alert("再試一次看看！");
            }
        }

        // 處理密碼 9306696
        function handleClear() {
            const pwd = document.getElementById('pwdInput').value;
            if (pwd === "9306696") {
                alert("數據已清空 (此為模擬動作)");
                document.getElementById('pwdInput').value = "";
            } else {
                alert("密碼不正確");
            }
        }

        // 初始化
        showMenu();
    </script>
</body>
</html>
