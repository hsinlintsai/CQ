<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>理化競速挑戰</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        
        /* 分數與計時器顯示 */
        .status-bar { display: flex; justify-content: space-between; background: #e9ecef; padding: 10px; border-radius: 10px; margin-bottom: 15px; font-weight: bold; }
        .score-val { color: #28a745; }
        .timer-val { color: #dc3545; }

        .btn { 
            display: block; width: 100%; min-height: 60px; margin: 12px 0; padding: 10px;
            font-size: 18px; color: #007aff; background: #fff; border: 2px solid #007aff; border-radius: 12px; cursor: pointer;
        }
        .btn:active { background: #007aff; color: #fff; }
        
        #question-text { font-size: 20px; font-weight: bold; margin: 20px 0; min-height: 50px; text-align: center; }
        
        /* 榮譽榜樣式 */
        .rank-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
        .rank-name { font-weight: bold; }
        
        .feedback { text-align: center; font-weight: bold; padding: 15px; border-radius: 10px; margin-top: 10px; display: none; }
        .wrong { background: #ffebeb; color: #d93025; }
        
        .admin-zone { margin-top: 30px; border-top: 2px dashed #ddd; padding-top: 15px; display: flex; gap: 5px; }
        .admin-zone input { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h3 id="title">載入中...</h3>
            <button onclick="showMenu()" style="padding: 5px 10px; border-radius: 5px; border: none; background: #ddd;">返回</button>
        </div>

        <div id="game-info" class="status-bar" style="display:none;">
            <span>得分: <span id="current-score" class="score-val">0</span></span>
            <span>本題剩餘: <span id="temp-score" class="timer-val">100</span></span>
        </div>
        
        <div id="main-area"></div>
        <div id="feedback-box" class="feedback"></div>

        <div id="admin-area" class="admin-zone">
            <input type="password" id="adminPwd" placeholder="管理密碼">
            <button onclick="clearRank()" style="background:#ff3b30; color:white; border:none; border-radius:5px; padding:8px 12px;">清空榮譽榜</button>
        </div>
    </div>

    <script src="./data.js"></script>
    <script>
        let totalScore = 0;
        let tempScore = 100;
        let timerId = null;
        let startTime = 0;
        let currentLv = 0;

        const mainArea = document.getElementById('main-area');
        const feedback = document.getElementById('feedback-box');
        const infoBar = document.getElementById('game-info');

        // 1. 顯示主選單與榮譽榜
        function showMenu() {
            clearInterval(timerId);
            infoBar.style.display = "none";
            feedback.style.display = "none";
            document.getElementById('title').innerText = "理化挑戰選單";
            
            let html = "<h4>選擇關卡</h4>";
            gameData.forEach((lv, i) => {
                html += `<button class="btn" onclick="startLevel(${i})">${lv.levelName}</button>`;
            });

            // 顯示榮譽榜
            const rankData = JSON.parse(localStorage.getItem('chemRank') || "[]");
            html += "<h4 style='margin-top:20px;'>🏆 榮譽榜 (前五名)</h4>";
            if(rankData.length === 0) {
                html += "<p style='color:gray; text-align:center;'>暫無紀錄</p>";
            } else {
                rankData.sort((a,b) => b.score - a.score).slice(0, 5).forEach((item, idx) => {
                    html += `<div class="rank-item"><span>${idx+1}. ${item.name}</span><span>${item.score} 分</span></div>`;
                });
            }
            mainArea.innerHTML = html;
        }

        // 2. 開始關卡
        function startLevel(idx) {
            currentLv = idx;
            totalScore = 0;
            document.getElementById('current-score').innerText = "0";
            infoBar.style.display = "flex";
            showQuestion(idx, 0);
        }

        // 3. 顯示題目與啟動計分計時器
        function showQuestion(lvIdx, qIdx) {
            clearInterval(timerId);
            feedback.style.display = "none";
            const q = gameData[lvIdx].questions[qIdx];

            if (!q) {
                finishGame();
                return;
            }

            document.getElementById('title').innerText = gameData[lvIdx].levelName;
            tempScore = 100;
            document.getElementById('temp-score').innerText = "100";
            
            // 計分邏輯：1.5秒後每秒扣10分
            startTime = Date.now();
            timerId = setInterval(() => {
                let elapsed = (Date.now() - startTime) / 1000;
                if (elapsed > 1.5) {
                    tempScore = 100 - Math.floor(elapsed - 1.5) * 10;
                    if (tempScore < 0) tempScore = 0;
                    document.getElementById('temp-score').innerText = tempScore;
                }
            }, 100);

            let optionsHtml = q.options.map((opt, i) => 
                `<button class="btn" onclick="check(${lvIdx}, ${qIdx}, ${i})">${opt}</button>`
            ).join('');

            mainArea.innerHTML = `<div id="question-text">${q.q}</div>${optionsHtml}`;
        }

        // 4. 檢查答案
        function check(lvIdx, qIdx, userAns) {
            clearInterval(timerId);
            const q = gameData[lvIdx].questions[qIdx];
            
            if (userAns === q.a) {
                totalScore += tempScore;
                document.getElementById('current-score').innerText = totalScore;
                showQuestion(lvIdx, qIdx + 1);
            } else {
                feedback.innerText = "答錯！正確答案是：" + q.options[q.a];
                feedback.className = "feedback wrong";
                feedback.style.display = "block";
                setTimeout(() => showQuestion(lvIdx, qIdx + 1), 1500);
            }
        }

        // 5. 結束並存入榮譽榜
        function finishGame() {
            infoBar.style.display = "none";
            const name = prompt("挑戰結束！你的總分是：" + totalScore + "\n請輸入你的大名：") || "無名氏";
            
            let rankData = JSON.parse(localStorage.getItem('chemRank') || "[]");
            rankData.push({ name: name, score: totalScore, date: new Date().toLocaleDateString() });
            localStorage.setItem('chemRank', JSON.stringify(rankData));
            
            showMenu();
        }

        // 6. 管理功能：清空紀錄
        function clearRank() {
            if (document.getElementById('adminPwd').value === "9306696") {
                localStorage.removeItem('chemRank');
                alert("榮譽榜已清空！");
                showMenu();
            } else {
                alert("密碼錯誤！");
            }
        }

        window.onload = showMenu;
    </script>
</body>
</html>
